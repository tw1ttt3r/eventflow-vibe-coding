name: Release on main PR close

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Create release from package version
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read package version
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ -z "$VERSION" ] || [ "$VERSION" = "undefined" ]; then
            echo "package.json must define a version before releasing." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check existing release tag
        id: existing_release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.package.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.existing_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.package.outputs.tag }}
          VERSION: ${{ steps.package.outputs.version }}
          TARGET_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        shell: bash
        run: |
          gh release create "$TAG_NAME" \
            --target "$TARGET_SHA" \
            --title "Release $VERSION" \
            --generate-notes
